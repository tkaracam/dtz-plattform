<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTZ-LID Mitgliederbereich</title>
  <style>
    @font-face { font-family: "Comfortaa"; src: url("./assets/fonts/Comfortaa-Light.ttf") format("truetype"); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: "Comfortaa"; src: url("./assets/fonts/Comfortaa-Regular.ttf") format("truetype"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Comfortaa"; src: url("./assets/fonts/Comfortaa-Bold.ttf") format("truetype"); font-weight: 700; font-style: normal; font-display: swap; }
    :root { --panel:#ffffff; --line:#d9e1ef; --text:#1f2f46; --muted:#5f6f88; --accent:#f08aa8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Comfortaa","Trebuchet MS",sans-serif; background: linear-gradient(180deg,#f8fbff 0%,#f1f5fb 100%); color:var(--text); }
    .container { width:min(1180px, calc(100% - 1rem)); max-width:100%; margin:22px auto 30px; }
    .top-nav { position: sticky; top: 10px; z-index: 40; display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; padding:10px 12px; border-radius:14px; border:1px solid #e7d6de; background: rgba(255,255,255,0.92); box-shadow:0 10px 24px rgba(59,52,66,0.1); backdrop-filter: blur(8px); }
    .nav-brand { display:flex; align-items:center; gap:10px; font-weight:700; color:#4a4454; text-decoration:none; }
    .nav-brand img { height:27px; }
    .shell { display:grid; gap:14px; }
    .card { background: var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; }
    .section-title { margin:0 0 6px; font-size:1.25rem; }
    .section-subtitle { margin:0 0 12px; color:var(--muted); font-size:.95rem; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(2, minmax(0,1fr)); }
    .row-end { display:flex; justify-content:flex-end; gap:10px; }
    label { font-weight:700; font-size:.9rem; }
    input, select, textarea { width:100%; padding:10px 12px; border:1px solid #d7e1f2; border-radius:10px; font-family:inherit; font-size:.95rem; }
    textarea { min-height:130px; resize: vertical; }
    button { border:1px solid #e6cfda; background:#fff7fa; color:#6f4f5f; border-radius:999px; padding:9px 14px; font-weight:700; cursor:pointer; }
    .primary { background: var(--accent); color:#fff; border-color: var(--accent); }
    .hidden { display:none; }
    .status.ok { color:#2b8a5b; }
    .status.error { color:#b65252; }
    .topic-box { border:1px solid #d8e3f4; border-radius:12px; padding:10px; background:#f7fbff; }
    .kpi { display:flex; gap:12px; flex-wrap: wrap; }
    .kpi-item { border:1px solid #d8e3f4; border-radius:12px; padding:10px 12px; background:#fbfdff; }
    .tags { display:flex; gap:8px; flex-wrap:wrap; }
    .tag { border:1px solid #d9e1ef; border-radius:999px; padding:4px 10px; font-size:.85rem; background:#f7fbff; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <a class="nav-brand" href="./index.html"><img src="./assets/dtzlib-logo-v3.png" alt="DTZ-LID"></a>
      <div id="memberStatus" class="hidden">Angemeldet</div>
    </nav>

    <div class="shell">
      <section id="authCard" class="card">
        <h2 class="section-title">Mitglied werden / Login</h2>
        <p class="section-subtitle">Neue Mitglieder registrieren oder einloggen.</p>
        <div class="grid">
          <div>
            <label for="regUsername">Benutzername (min. 6 Zeichen)</label>
            <input id="regUsername" type="text" placeholder="z. B. mustermann01">
          </div>
          <div>
            <label for="regPassword">Passwort (min. 6 Zeichen, 1 Großbuchstabe)</label>
            <input id="regPassword" type="password">
          </div>
        </div>
        <div class="grid">
          <div>
            <label for="regName">Name (optional)</label>
            <input id="regName" type="text" placeholder="Vorname Nachname">
          </div>
          <div>
            <label for="regEmail">E-Mail (optional)</label>
            <input id="regEmail" type="email" placeholder="name@mail.com">
          </div>
        </div>
        <div class="row-end">
          <button id="registerBtn" class="primary" type="button">Jetzt registrieren</button>
        </div>
        <hr style="border:none;border-top:1px solid #e3eaf6;margin:14px 0;">
        <div class="grid">
          <div>
            <label for="loginUsername">Benutzername</label>
            <input id="loginUsername" type="text">
          </div>
          <div>
            <label for="loginPassword">Passwort</label>
            <input id="loginPassword" type="password">
          </div>
        </div>
        <div class="row-end">
          <button id="loginBtn" type="button">Anmelden</button>
        </div>
        <div id="authStatus" class="status hidden"></div>
      </section>

      <section id="workCard" class="card hidden">
        <h2 class="section-title">Mail schreiben (frei wählen)</h2>
        <p class="section-subtitle">Thema auswählen, Mail schreiben und zur Korrektur senden.</p>
        <div class="topic-box">
          <label for="topicSelect">Thema auswählen</label>
          <select id="topicSelect"></select>
          <p id="topicPrompt" class="section-subtitle" style="margin-top:8px;"></p>
        </div>
        <div style="margin-top:10px;">
          <label for="memberLetter">Ihre Mail</label>
          <textarea id="memberLetter" placeholder="Sehr geehrte Damen und Herren, ..." autocorrect="on" autocapitalize="sentences" spellcheck="true"></textarea>
        </div>
        <div class="row-end" style="margin-top:10px;">
          <button id="sendLetterBtn" class="primary" type="button">Brief hochladen</button>
        </div>
        <div id="letterStatus" class="status hidden"></div>
      </section>

      <section id="portalCard" class="card hidden">
        <h2 class="section-title">Portal</h2>
        <p class="section-subtitle">Korrigierte Briefe und Ihre Daten.</p>

        <div class="card" style="margin-top:10px;">
          <h3 style="margin:0 0 8px;">Korrigierte Briefe</h3>
          <label for="correctionSelect">Korrektur auswählen</label>
          <select id="correctionSelect"></select>
          <div class="kpi" style="margin-top:10px;">
            <div class="kpi-item"><div class="muted">Punkte</div><div id="corrScore">-</div></div>
            <div class="kpi-item"><div class="muted">Niveau</div><div id="corrLevel">-</div></div>
          </div>
          <div id="corrPreview" style="margin-top:10px; white-space:pre-wrap;" class="topic-box"></div>
          <div style="margin-top:10px;">
            <strong>Erfüllte Punkte</strong>
            <div id="corrCovered" class="tags"></div>
          </div>
          <div style="margin-top:10px;">
            <strong>Fehlende Punkte</strong>
            <div id="corrMissing" class="tags"></div>
          </div>
        </div>

        <div class="card" style="margin-top:12px;">
          <h3 style="margin:0 0 8px;">Meine Daten</h3>
          <div class="grid">
            <div>
              <label for="profileName">Name</label>
              <input id="profileName" type="text">
            </div>
            <div>
              <label for="profileEmail">E-Mail</label>
              <input id="profileEmail" type="email">
            </div>
          </div>
          <div class="grid">
            <div>
              <label for="profileCurrentPassword">Aktuelles Passwort (für Passwortänderung)</label>
              <input id="profileCurrentPassword" type="password">
            </div>
            <div>
              <label for="profileNewPassword">Neues Passwort</label>
              <input id="profileNewPassword" type="password">
            </div>
          </div>
          <div class="row-end">
            <button id="saveProfileBtn" type="button">Änderungen speichern</button>
            <button id="logoutBtn" type="button">Abmelden</button>
          </div>
          <div id="profileStatus" class="status hidden"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const topics = [
      { title: "Arzttermin verschieben", prompt: "Sie haben einen Termin beim Arzt, können aber nicht kommen. Schreiben Sie eine E-Mail: Grund, neuer Terminwunsch, Kontakt." },
      { title: "Wohnung: Heizung defekt", prompt: "Schreiben Sie an die Hausverwaltung: Heizung ist kaputt. Nennen Sie seit wann und bitten Sie um Reparatur." },
      { title: "Kurs: Fehlende Kursbescheinigung", prompt: "Bitten Sie Ihre Sprachschule um eine Kursbescheinigung. Nennen Sie Kurs und Grund." },
      { title: "Arbeit: Urlaub beantragen", prompt: "Schreiben Sie Ihrer Chefin: Wunschdatum, Grund, Bitte um Bestätigung." },
      { title: "Behörde: Termin absagen", prompt: "Sagen Sie einen Termin beim Bürgeramt ab und bitten Sie um einen neuen Termin." }
    ];

    const topicSelect = document.getElementById("topicSelect");
    const topicPrompt = document.getElementById("topicPrompt");
    function renderTopics() {
      topicSelect.innerHTML = "";
      topics.forEach((t, idx) => {
        const opt = document.createElement("option");
        opt.value = String(idx);
        opt.textContent = t.title;
        topicSelect.appendChild(opt);
      });
      setTopicPrompt();
    }
    function setTopicPrompt() {
      const idx = Number(topicSelect.value || 0);
      topicPrompt.textContent = topics[idx] ? topics[idx].prompt : "";
    }
    topicSelect.addEventListener("change", setTopicPrompt);

    function setStatus(id, type, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = `status ${type}`;
      el.textContent = text;
      el.classList.remove("hidden");
    }
    function clearStatus(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = "status hidden";
      el.textContent = "";
    }

    async function memberSession() {
      const res = await fetch("./api/member_session.php", { method: "GET" });
      return res.json();
    }

    function showLoggedIn(session) {
      document.getElementById("authCard").classList.add("hidden");
      document.getElementById("workCard").classList.remove("hidden");
      document.getElementById("portalCard").classList.remove("hidden");
      document.getElementById("profileName").value = session.display_name || "";
      document.getElementById("profileEmail").value = session.email || "";
    }

    async function refreshPortal() {
      const res = await fetch("./api/member_portal.php", { method: "GET" });
      const data = await res.json();
      const select = document.getElementById("correctionSelect");
      select.innerHTML = "";
      if (!data.corrections || !data.corrections.length) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "Noch keine freigegebenen Korrekturen";
        select.appendChild(opt);
        document.getElementById("corrPreview").textContent = "";
        document.getElementById("corrScore").textContent = "-";
        document.getElementById("corrLevel").textContent = "-";
        document.getElementById("corrCovered").innerHTML = "";
        document.getElementById("corrMissing").innerHTML = "";
        return;
      }
      data.corrections.forEach((c, i) => {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = c.topic ? c.topic.slice(0, 70) : `Korrektur ${i + 1}`;
        select.appendChild(opt);
      });
      select.value = "0";
      renderCorrection(data.corrections[0]);
      select.onchange = () => {
        const idx = Number(select.value || 0);
        renderCorrection(data.corrections[idx]);
      };
    }

    function renderCorrection(c) {
      if (!c) return;
      document.getElementById("corrPreview").textContent = c.corrected_text || "";
      document.getElementById("corrScore").textContent = c.score_total ? `${c.score_total}/20` : "-";
      document.getElementById("corrLevel").textContent = c.niveau_einschaetzung || "-";
      const covered = document.getElementById("corrCovered");
      const missing = document.getElementById("corrMissing");
      covered.innerHTML = ""; missing.innerHTML = "";
      (c.covered_points || []).forEach(p => { const s = document.createElement("span"); s.className = "tag"; s.textContent = p; covered.appendChild(s); });
      (c.missing_points || []).forEach(p => { const s = document.createElement("span"); s.className = "tag"; s.textContent = p; missing.appendChild(s); });
    }

    document.getElementById("registerBtn").addEventListener("click", async () => {
      clearStatus("authStatus");
      const payload = {
        username: document.getElementById("regUsername").value.trim(),
        password: document.getElementById("regPassword").value,
        display_name: document.getElementById("regName").value.trim(),
        email: document.getElementById("regEmail").value.trim()
      };
      const res = await fetch("./api/member_register.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus("authStatus", "error", data.error || "Registrierung fehlgeschlagen");
        return;
      }
      setStatus("authStatus", "ok", "Registrierung erfolgreich. Bitte anmelden.");
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      clearStatus("authStatus");
      const payload = {
        username: document.getElementById("loginUsername").value.trim(),
        password: document.getElementById("loginPassword").value
      };
      const res = await fetch("./api/member_login.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus("authStatus", "error", data.error || "Login fehlgeschlagen");
        return;
      }
      showLoggedIn(data);
      await refreshPortal();
    });

    document.getElementById("sendLetterBtn").addEventListener("click", async () => {
      clearStatus("letterStatus");
      const idx = Number(topicSelect.value || 0);
      const prompt = topics[idx] ? topics[idx].prompt : "";
      const letter = document.getElementById("memberLetter").value.trim();
      if (!letter) {
        setStatus("letterStatus", "error", "Bitte schreiben Sie Ihre Mail.");
        return;
      }
      const res = await fetch("./api/member_save_letter.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          student_name: document.getElementById("profileName").value.trim(),
          letter_text: letter,
          task_prompt: prompt,
          required_points: prompt.split("-").map(s => s.trim()).filter(Boolean)
        })
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus("letterStatus", "error", data.error || "Upload fehlgeschlagen");
        return;
      }
      setStatus("letterStatus", "ok", "Brief hochgeladen. Freigabe durch Lehrkraft ausstehend.");
      document.getElementById("memberLetter").value = "";
    });

    document.getElementById("saveProfileBtn").addEventListener("click", async () => {
      clearStatus("profileStatus");
      const payload = {
        display_name: document.getElementById("profileName").value.trim(),
        email: document.getElementById("profileEmail").value.trim(),
        current_password: document.getElementById("profileCurrentPassword").value,
        new_password: document.getElementById("profileNewPassword").value
      };
      const res = await fetch("./api/member_update.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus("profileStatus", "error", data.error || "Speichern fehlgeschlagen");
        return;
      }
      setStatus("profileStatus", "ok", "Daten gespeichert.");
      document.getElementById("profileCurrentPassword").value = "";
      document.getElementById("profileNewPassword").value = "";
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await fetch("./api/member_logout.php", { method: "POST" });
      location.reload();
    });

    (async () => {
      renderTopics();
      const session = await memberSession();
      if (session.authenticated) {
        showLoggedIn(session);
        await refreshPortal();
      }
    })();
  </script>
</body>
</html>
