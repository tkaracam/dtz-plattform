<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DTZ-LiD · Dozenteneingang</title>
  <style>
    :root {
      --bg-1: #f6f1eb;
      --bg-2: #fbf7f3;
      --paper: #ffffff;
      --ink: #2f2b28;
      --muted: #73685f;
      --line: rgba(207, 189, 173, 0.6);
      --accent: #f07a56;
      --accent-2: #e39a61;
      --radius: 18px;
      --shadow: 0 12px 30px rgba(34, 32, 30, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comfortaa", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 460px at 12% -12%, rgba(225, 197, 171, 0.24), transparent 64%),
        radial-gradient(800px 420px at 100% 0%, rgba(241, 194, 154, 0.16), transparent 66%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.8vw, 2rem);
      text-align: center;
      color: #2f2b28;
    }

    p {
      margin: 10px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .buttons {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 48px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-decoration: none;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 22px rgba(191, 122, 76, 0.28);
    }

    .btn.secondary {
      color: #655446;
      background: #fffaf5;
      border-color: #e1d2c4;
      box-shadow: none;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Dozenteneingang</h1>
    <p>Bitte den gewünschten Bereich auswählen.</p>
    <div class="buttons">
      <a class="btn" href="./docent_admin.html">Dozent Admin</a>
      <a class="btn secondary" href="./admin.html">Hauptadmin</a>
    </div>
  </main>
</body>
</html>
