name: Post-Deploy Healthcheck

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Healthcheck URL (z. B. https://dtz-lid.com)"
        required: false
        default: "https://dtz-lid.com"
      warmup_seconds:
        description: "Deploy sonrası bekleme (saniye)"
        required: false
        default: "180"

permissions:
  contents: read

concurrency:
  group: post-deploy-healthcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TARGET_URLS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_url || 'https://dtz-lid.com https://www.dtz-lid.com' }}
      WARMUP_SECONDS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.warmup_seconds || '180' }}
      MAX_ATTEMPTS: "8"
      RETRY_DELAY_SECONDS: "30"
      HC_STUDENT_USERNAME: ${{ secrets.HC_STUDENT_USERNAME }}
      HC_STUDENT_PASSWORD: ${{ secrets.HC_STUDENT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare healthcheck script
        run: chmod +x tools/healthcheck.sh

      - name: Warmup (wait for Render deploy)
        run: |
          echo "Waiting ${WARMUP_SECONDS}s for deployment propagation..."
          sleep "${WARMUP_SECONDS}"

      - name: Run healthcheck with retry
        run: |
          set -euo pipefail
          LOG_FILE="${RUNNER_TEMP}/healthcheck.log"
          : > "${LOG_FILE}"
          overall_failed=0

          {
            echo "## Post-Deploy Healthcheck"
            echo ""
            echo "- Targets: \`${TARGET_URLS}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          for BASE_URL in ${TARGET_URLS}; do
            attempt=1
            passed=0
            while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
              echo "Attempt ${attempt}/${MAX_ATTEMPTS} -> ${BASE_URL}"
              if ./tools/healthcheck.sh "${BASE_URL}" 2>&1 | tee -a "${LOG_FILE}"; then
                passed=1
                break
              fi
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                echo "Healthcheck failed for ${BASE_URL}. Retrying in ${RETRY_DELAY_SECONDS}s..."
                sleep "${RETRY_DELAY_SECONDS}"
              fi
              attempt=$((attempt + 1))
            done

            if [ "$passed" -eq 1 ]; then
              {
                echo "- ✅ \`${BASE_URL}\` passed (\`${attempt}/${MAX_ATTEMPTS}\`)"
              } >> "${GITHUB_STEP_SUMMARY}"
            else
              overall_failed=1
              {
                echo "- ❌ \`${BASE_URL}\` failed after \`${MAX_ATTEMPTS}\` attempts"
              } >> "${GITHUB_STEP_SUMMARY}"
            fi
          done

          if [ "$overall_failed" -ne 0 ]; then
            {
              echo ""
              echo "### Last log lines"
              echo '```'
              tail -n 120 "${LOG_FILE}" || true
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

      - name: Upload healthcheck log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healthcheck-log
          path: ${{ runner.temp }}/healthcheck.log
          if-no-files-found: ignore
